<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ settings.app_name }}{% endblock %}</title>
  <meta name="description" content="Prototype label-compliance review for TTB agents. Upload a label, get a verdict.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="masthead">
    <a href="/" class="mark">
      <span class="mark__seal" aria-hidden="true"></span>
      <span class="mark__name">
        <strong>TTB Label Review</strong>
        <span class="mark__sub">Prototype · Treasury interview submission</span>
      </span>
    </a>
    <nav class="masthead__nav">
      <a href="/" class="{% if request.url.path == '/' %}is-active{% endif %}">Single label</a>
      <a href="/batch" class="{% if request.url.path == '/batch' %}is-active{% endif %}">Batch</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Built as a prototype. Not for production use. No labels are retained.</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
